<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BEACON PIR Generator{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; }
    nav { background: #1a1a2e; color: #fff; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
    nav a { color: #aad4f5; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #fff; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #fff; }
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    h2 { font-size: 1.2rem; margin: 1.5rem 0 0.5rem; }
    .card { background: #fff; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.25rem; font-weight: 500; font-size: 0.9rem; }
    input[type=file], input[type=text], textarea, select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
    textarea { resize: vertical; min-height: 80px; }
    .btn { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 4px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .btn-primary { background: #0057b7; color: #fff; }
    .btn-primary:hover { background: #0041a0; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover { background: #ccc; }
    .btn-danger { background: #c0392b; color: #fff; }
    .tag { display: inline-block; background: #e8f0fe; color: #1a5276; border-radius: 3px; padding: 0.15rem 0.5rem; font-size: 0.78rem; margin: 0.15rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee; }
    th { background: #f0f0f0; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 3px; font-size: 0.78rem; font-weight: 600; }
    .badge-strategic { background: #c0392b; color: #fff; }
    .badge-operational { background: #e67e22; color: #fff; }
    .badge-tactical { background: #27ae60; color: #fff; }
    .alert { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; }
    .alert-info { background: #d6eaf8; border-left: 4px solid #2980b9; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">BEACON</span>
    <a href="/">Generate</a>
    <a href="/review">Review</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
